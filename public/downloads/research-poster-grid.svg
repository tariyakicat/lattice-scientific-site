<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Research Poster Grid</title>
  <desc id="desc">An editable three-column scientific poster layout.</desc>
  <rect width="1200" height="1600" fill="#f9fbfd"/>
  <rect width="1200" height="245" fill="#dceef8"/>
  <circle cx="1030" cy="120" r="170" fill="#c9e2f2" opacity=".7"/>
  <text x="80" y="105" fill="#1a2433" font-family="Georgia,serif" font-size="54" font-weight="700">Research poster title</text>
  <text x="82" y="160" fill="#526070" font-family="Arial,sans-serif" font-size="24">Authors · laboratory · institution</text>
  <g transform="translate(70 300)" font-family="Arial,sans-serif">
    <g>
      <rect width="330" height="1130" rx="18" fill="#fff" stroke="#dfe7ed" stroke-width="3"/>
      <text x="28" y="60" fill="#1f7fc4" font-size="26" font-weight="700">01 · CONTEXT</text>
      <rect x="28" y="95" width="274" height="180" rx="12" fill="#eef4f8"/>
      <path d="M45 330h230M45 365h255M45 400h210M45 435h245" stroke="#c3ced8" stroke-width="12" stroke-linecap="round"/>
      <text x="28" y="520" fill="#1f7fc4" font-size="26" font-weight="700">02 · QUESTION</text>
      <circle cx="165" cy="735" r="130" fill="#eaf5fb"/>
      <path d="M110 735h110M165 680v110" stroke="#1f7fc4" stroke-width="18" stroke-linecap="round"/>
    </g>
    <g transform="translate(365)">
      <rect width="330" height="1130" rx="18" fill="#fff" stroke="#dfe7ed" stroke-width="3"/>
      <text x="28" y="60" fill="#1f7fc4" font-size="26" font-weight="700">03 · METHODS</text>
      <path d="M75 210C150 120 180 300 255 210" fill="none" stroke="#c0653f" stroke-width="18" stroke-linecap="round"/>
      <circle cx="75" cy="210" r="25" fill="#f2c3b1"/><circle cx="255" cy="210" r="25" fill="#f2c3b1"/>
      <text x="28" y="400" fill="#1f7fc4" font-size="26" font-weight="700">04 · RESULTS</text>
      <rect x="28" y="445" width="274" height="315" rx="12" fill="#f6f9fb"/>
      <path d="M60 700V505M60 700h210" stroke="#9caab8" stroke-width="8"/>
      <path d="M85 665l55-75 60 35 50-110" fill="none" stroke="#1f7fc4" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M45 850h230M45 885h255M45 920h210" stroke="#c3ced8" stroke-width="12" stroke-linecap="round"/>
    </g>
    <g transform="translate(730)">
      <rect width="330" height="1130" rx="18" fill="#fff" stroke="#dfe7ed" stroke-width="3"/>
      <text x="28" y="60" fill="#1f7fc4" font-size="26" font-weight="700">05 · CONCLUSION</text>
      <circle cx="165" cy="260" r="130" fill="#e9f5f1"/>
      <path d="M100 270l45 48 90-120" fill="none" stroke="#238765" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M45 485h230M45 520h255M45 555h210M45 590h245" stroke="#c3ced8" stroke-width="12" stroke-linecap="round"/>
      <text x="28" y="710" fill="#1f7fc4" font-size="26" font-weight="700">REFERENCES</text>
      <path d="M45 760h230M45 795h255M45 830h210M45 865h245M45 900h195" stroke="#c3ced8" stroke-width="10" stroke-linecap="round"/>
    </g>
  </g>
  <text x="600" y="1515" fill="#5a6675" font-family="Arial,sans-serif" font-size="22" text-anchor="middle">A0 landscape-ready modular poster template</text>
</svg>
