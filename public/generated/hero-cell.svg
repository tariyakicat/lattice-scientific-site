<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="3D-style biological cell cross-section with DNA and molecules">
  <defs>
    <radialGradient id="bg" cx="55%" cy="43%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#edf8ff"/>
      <stop offset="100%" stop-color="#dcecf8"/>
    </radialGradient>
    <radialGradient id="cellBody" cx="44%" cy="34%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".98"/>
      <stop offset="26%" stop-color="#cfefff" stop-opacity=".92"/>
      <stop offset="64%" stop-color="#b8b6f3" stop-opacity=".76"/>
      <stop offset="100%" stop-color="#7bc4e6" stop-opacity=".58"/>
    </radialGradient>
    <radialGradient id="nucleus" cx="38%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#bfc3ff"/>
      <stop offset="100%" stop-color="#7f77dc"/>
    </radialGradient>
    <linearGradient id="membrane" x1="10%" x2="90%" y1="15%" y2="85%">
